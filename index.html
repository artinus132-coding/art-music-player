<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Artinus Music PRO 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Poppins',sans-serif;
    background:#f4f6fb;
    color:#222;
    overflow:hidden;
    transition:.3s;
}
body.dark{
    background:#121212;
    color:#eee;
}
.container{display:flex;height:100vh}

/* ================= SIDEBAR ================= */
.sidebar{
    width:270px;
    background:#1f2128;
    color:#fff;
    padding:20px;
    display:flex;
    flex-direction:column;
    position:fixed;
    height:100%;
    left:0;
    top:0;
    z-index:1000;
    transition:.3s;
}
body.sidebar-hide .sidebar{transform:translateX(-100%)}

.sidebar h1{font-size:18px;margin-bottom:25px}
.nav-item{
    padding:10px;
    border-radius:8px;
    margin-bottom:6px;
    cursor:pointer;
}
.nav-item:hover{background:#333}
.nav-item.active{background:#667eea}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    backdrop-filter:blur(3px);
    opacity:0;
    pointer-events:none;
    transition:.3s;
}
body.sidebar-open .overlay{
    opacity:1;
    pointer-events:auto;
}

/* ================= MAIN ================= */
.main{
    flex:1;
    margin-left:270px;
    display:flex;
    flex-direction:column;
    padding:20px;
    overflow:hidden;
}
@media(max-width:768px){
    .main{margin-left:0}
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
.menu-btn{
    font-size:22px;
    cursor:pointer;
    display:none;
}
@media(max-width:768px){
    .menu-btn{display:block}
}

.dark-toggle{
    cursor:pointer;
    padding:6px 12px;
    border-radius:6px;
    background:#667eea;
    color:#fff;
    font-size:12px;
}

/* ================= PLAYER ================= */
.player{
    background:#fff;
    border-radius:14px;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    gap:20px;
    align-items:center;
}
body.dark .player{background:#1e1e1e}

.album{
    width:120px;
    height:120px;
    border-radius:12px;
    object-fit:cover;
}
.song-meta h2{font-size:18px}
.song-meta p{font-size:13px;color:#888}

.controls{margin-top:15px}
.controls button{
    margin-right:8px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#667eea;
    color:#fff;
}

/* ================= LIST ================= */
.list{
    flex:1;
    overflow:auto;
    background:#fff;
    border-radius:12px;
}
body.dark .list{background:#1e1e1e}

.song{
    padding:12px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    cursor:pointer;
}
body.dark .song{border-bottom:1px solid #333}
.song:hover{background:#f2f4ff}
body.dark .song:hover{background:#2a2a2a}

/* ================= MINI PLAYER ================= */
.mini{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#667eea;
    color:#fff;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.mini button{
    background:none;
    border:none;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay" onclick="toggleSidebar(false)"></div>

<div class="container">

<div class="sidebar">
<h1>💿 Artinus Music</h1>

<div class="nav-item active" onclick="switchView('all',this)">🏠 Home</div>
<div class="nav-item" onclick="switchView('pop',this)">🎤 Pop</div>
<div class="nav-item" onclick="switchView('sleep',this)">😴 Sleep</div>
<div class="nav-item" onclick="switchView('jazz',this)">🎷 Jazz</div>

</div>

<div class="main">

<div class="header">
<div class="menu-btn" onclick="toggleSidebar()">☰</div>
<div class="dark-toggle" onclick="toggleDark()">Toggle Dark</div>
</div>

<div class="player">
<img id="cover" class="album" src="https://i.scdn.co/image/ab67616d0000b273f4f0e4bb4f0c6f15c93dffa7">
<div class="song-meta">
<h2 id="title">Select Song</h2>
<p id="artist">---</p>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="togglePlay()" id="playBtn">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>
</div>

<div class="list" id="list"></div>

</div>
</div>

<div class="mini" id="mini" style="display:none">
<span id="miniTitle">-</span>
<div>
<button onclick="togglePlay()">▶</button>
</div>
</div>

<audio id="audio"></audio>

<script>

/* ================= DARK MODE AUTO ================= */
if(window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.body.classList.add('dark');
}
function toggleDark(){
    document.body.classList.toggle('dark');
}

/* ================= SIDEBAR ================= */
function toggleSidebar(force){
    if(force===false){
        document.body.classList.remove('sidebar-open');
        document.body.classList.add('sidebar-hide');
        return;
    }
    document.body.classList.toggle('sidebar-open');
    document.body.classList.toggle('sidebar-hide');
}

/* Swipe Close */
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
    if(startX - e.changedTouches[0].clientX > 80){
        document.body.classList.add('sidebar-hide');
    }
});

/* ================= SONG DATA ================= */
const songs=[
{title:"Bunga Matahari",artist:"Sal Priadi",genre:"pop",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
{title:"Fine Today",artist:"Ardhito Pramono",genre:"pop",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
{title:"Tak Ingin Usai",artist:"Keisya Levronka",genre:"pop",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
{title:"Hati-Hati di Jalan",artist:"Tulus",genre:"pop",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"},
{title:"Sial",artist:"Mahalini",genre:"pop",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"},
{title:"Saturn",artist:"Sleeping At Last",genre:"sleep",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3"},
{title:"Fix You (Acoustic)",artist:"Coldplay",genre:"sleep",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3"},
{title:"All I Want",artist:"Kodaline",genre:"sleep",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"},
{title:"Photograph (Acoustic)",artist:"Ed Sheeran",genre:"sleep",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3"},
{title:"Make You Feel My Love",artist:"Adele",genre:"sleep",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"},
{title:"Fly Me To The Moon",artist:"Frank Sinatra",genre:"jazz",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
{title:"L-O-V-E",artist:"Nat King Cole",genre:"jazz",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
{title:"Cheek to Cheek",artist:"Ella Fitzgerald",genre:"jazz",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
{title:"What A Wonderful World",artist:"Louis Armstrong",genre:"jazz",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"}
];

let current=0;
const audio=document.getElementById("audio");

/* ================= RENDER ================= */
function render(filter="all"){
    const list=document.getElementById("list");
    list.innerHTML="";
    songs.filter(s=>filter==="all"||s.genre===filter)
    .forEach((s,i)=>{
        const div=document.createElement("div");
        div.className="song";
        div.innerHTML=`<span>${s.title}</span><span>${s.artist}</span>`;
        div.onclick=()=>play(i);
        list.appendChild(div);
    });
}
render();

/* ================= PLAYER ================= */
function play(i){
    current=i;
    audio.src=songs[i].url;
    audio.play();
    document.getElementById("title").innerText=songs[i].title;
    document.getElementById("artist").innerText=songs[i].artist;
    document.getElementById("mini").style.display="flex";
    document.getElementById("miniTitle").innerText=songs[i].title;
}
function togglePlay(){
    if(audio.paused){audio.play()}
    else{audio.pause()}
}
function next(){play((current+1)%songs.length)}
function prev(){play((current-1+songs.length)%songs.length)}

/* ================= VIEW SWITCH ================= */
function switchView(view,el){
    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    el.classList.add("active");
    render(view);
    if(window.innerWidth<768) toggleSidebar(false);
}

</script>

</body>
</html>
