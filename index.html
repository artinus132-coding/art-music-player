<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artinus Music Player - Stream Your Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow: hidden;
        }

        .watermark {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 1000;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .watermark a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: 0.3s;
        }

        .watermark a:hover {
            color: white;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 0;
            background: white;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, #2a2d3a 0%, #1f2128 100%);
            color: white;
            padding: 30px 20px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .playlist-section, .upload-section {
            margin-bottom: 35px;
        }

        .playlist-section h3, .upload-section h3 {
            margin-bottom: 15px;
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .create-playlist {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .create-playlist input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 13px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .create-playlist input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .create-playlist input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.3);
        }

        .create-playlist button {
            padding: 10px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .create-playlist button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .playlist-list {
            list-style: none;
        }

        .playlist-item {
            padding: 12px 14px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .playlist-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            border-color: rgba(102, 126, 234, 0.5);
            color: #e0e7ff;
        }

        .delete-playlist {
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .delete-playlist:hover {
            background: rgba(239, 68, 68, 1);
        }

        .upload-section input {
            display: block;
            margin-bottom: 12px;
            width: 100%;
            padding: 10px;
            border: 2px dashed rgba(102, 126, 234, 0.5);
            border-radius: 10px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            font-size: 13px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .upload-section input:hover {
            border-color: rgba(102, 126, 234, 0.8);
            background: rgba(255, 255, 255, 0.08);
        }

        .upload-section button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .upload-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
            overflow-y: auto;
            padding: 30px 40px;
        }

        .main-content::-webkit-scrollbar {
            width: 8px;
        }

        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 4px;
        }

        .main-content::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            align-items: center;
        }

        .search-box, .filter-box {
            display: flex;
            gap: 10px;
        }

        .search-box input, .filter-box select {
            padding: 12px 16px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: white;
            transition: 0.3s;
        }

        .search-box input:focus, .filter-box select:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.6);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-box button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        /* Now Playing */
        .now-playing {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .album-art {
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .album-art img {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
            animation: spin 3s linear infinite;
        }

        .album-art img.paused {
            animation: none;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .album-art::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-radius: 20px;
            z-index: -1;
        }

        .song-info h2 {
            font-size: 32px;
            margin-bottom: 12px;
            color: #2a2d3a;
            font-weight: 700;
        }

        .song-info p {
            font-size: 15px;
            color: #888;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        /* Progress Bar */
        .player-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .player-progress input {
            flex: 1;
            cursor: pointer;
            height: 6px;
            border-radius: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.3) 0%, rgba(102, 126, 234, 0.1) 100%);
        }

        .player-progress input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            transition: 0.2s;
        }

        .player-progress input::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .player-progress input::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .player-progress span {
            font-size: 13px;
            color: #888;
            min-width: 40px;
            font-weight: 500;
        }

        /* Player Controls */
        .player-controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
        }

        .player-controls button {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            padding: 12px;
            border-radius: 50%;
        }

        .player-controls button:hover {
            transform: scale(1.15);
        }

        #playBtn {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
            transition: 0.3s;
        }

        #playBtn:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 16px 45px rgba(102, 126, 234, 0.5);
        }

        .active-control {
            color: #667eea;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        /* Volume Control */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .volume-control input {
            width: 160px;
            height: 6px;
            border-radius: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.3) 0%, rgba(102, 126, 234, 0.1) 100%);
            cursor: pointer;
        }

        .volume-control input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .volume-control input::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* Songs List */
        .songs-section {
            flex: 1;
        }

        .songs-section h3 {
            margin-bottom: 20px;
            color: #2a2d3a;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .songs-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .song-item {
            padding: 16px 18px;
            background: white;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .song-item:hover {
            background: white;
            transform: translateX(8px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .song-item.playing {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            color: #667eea;
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .song-item-info {
            flex: 1;
            cursor: pointer;
        }

        .song-item-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: #2a2d3a;
            font-size: 15px;
        }

        .song-item.playing .song-item-title {
            color: #667eea;
        }

        .song-item-details {
            font-size: 13px;
            opacity: 0.7;
            color: #888;
        }

        .song-item.playing .song-item-details {
            opacity: 0.9;
            color: #764ba2;
        }

        .song-item-actions {
            display: flex;
            gap: 10px;
        }

        .song-item-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .add-to-playlist {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .add-to-playlist:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.3);
        }

        .remove-song {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .remove-song:hover {
            background: #ef4444;
            color: white;
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 180px;
                overflow-x: auto;
                padding: 15px;
            }

            .main-content {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 20px;
            }

            .search-box {
                width: 100%;
            }

            .album-art img {
                width: 120px;
                height: 120px;
            }

            .song-info h2 {
                font-size: 22px;
            }

            .player-controls {
                gap: 15px;
            }

            #playBtn {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }
        }

        /* Empty State */
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="watermark">
        Powered by <a href="https://github.com/artinus132-coding" target="_blank">Artinus Website</a>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span style="font-size: 24px;">🎵</span>
                <h1>Artinus Music</h1>
            </div>
            
            <div class="playlist-section">
                <h3>📋 Playlists</h3>
                <div class="create-playlist">
                    <input type="text" id="playlistName" placeholder="Playlist name...">
                    <button onclick="createPlaylist()">+</button>
                </div>
                <ul id="playlistList" class="playlist-list">
                    <!-- Playlists will be added here -->
                </ul>
            </div>

            <div class="upload-section">
                <h3>⬆️ Upload Music</h3>
                <input type="file" id="musicUpload" accept="audio/*" multiple>
                <button onclick="uploadMusic()">Upload Songs</button>
            </div>
        </aside>

        <!-- Main Player -->
        <main class="main-content">
            <!-- Header with Search and Filter -->
            <header class="header">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search your favorite songs...">
                    <button onclick="searchSongs()">🔍</button>
                </div>
                
                <div class="filter-box">
                    <select id="genreFilter" onchange="filterByGenre()">
                        <option value="">All Genres</option>
                        <option value="Pop">Pop</option>
                        <option value="Rock">Rock</option>
                        <option value="Jazz">Jazz</option>
                        <option value="Hip-Hop">Hip-Hop</option>
                        <option value="Electronic">Electronic</option>
                        <option value="Classical">Classical</option>
                        <option value="R&B">R&B</option>
                        <option value="Country">Country</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </header>

            <!-- Now Playing Section -->
            <section class="now-playing">
                <div class="album-art">
                    <img id="albumArt" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23grad)' width='180' height='180'/%3E%3Ctext x='50%25' y='50%25' font-size='80' fill='white' text-anchor='middle' dy='.35em' font-family='Arial'%3E🎵%3C/text%3E%3C/svg%3E" alt="Album Art">
                </div>
                <div class="song-info">
                    <h2 id="songTitle">No Song Selected</h2>
                    <p id="artistName">Select a song to play</p>
                    <p id="genreDisplay">Genre: -</p>
                </div>
            </section>

            <!-- Progress Bar -->
            <section class="player-progress">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" min="0" max="100" value="0">
                <span id="duration">0:00</span>
            </section>

            <!-- Player Controls -->
            <section class="player-controls">
                <button id="repeatBtn" onclick="toggleRepeat()" title="Repeat">🔁</button>
                <button onclick="previousSong()" title="Previous">⏮️</button>
                <button id="playBtn" onclick="togglePlay()" title="Play">▶️</button>
                <button onclick="nextSong()" title="Next">⏭️</button>
                <button id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
            </section>

            <!-- Volume Control -->
            <section class="volume-control">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
            </section>

            <!-- Songs List -->
            <section class="songs-section">
                <h3>🎼 Now Playing</h3>
                <ul id="songsList" class="songs-list">
                    <!-- Songs will be added here -->
                </ul>
            </section>
        </main>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // Music Player Application
        class MusicPlayer {
            constructor() {
                this.audio = document.getElementById('audioPlayer');
                this.playlists = this.loadPlaylists();
                this.currentPlaylist = 'All Songs';
                this.currentSongIndex = 0;
                this.isPlaying = false;
                this.shuffle = false;
                this.repeat = 0;
                this.allSongs = this.loadSongs();
                
                this.initEventListeners();
                this.displayPlaylists();
                this.displaySongs();
            }

            initEventListeners() {
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('ended', () => this.handleSongEnd());
                this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
                
                document.getElementById('progressBar').addEventListener('change', (e) => {
                    this.audio.currentTime = (e.target.value / 100) * this.audio.duration;
                });

                document.getElementById('volumeSlider').addEventListener('change', (e) => {
                    this.audio.volume = e.target.value / 100;
                });

                document.getElementById('searchInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.searchSongs();
                });
            }

            loadSongs() {
                const saved = localStorage.getItem('songs');
                return saved ? JSON.parse(saved) : [];
            }

            saveSongs() {
                localStorage.setItem('songs', JSON.stringify(this.allSongs));
            }

            loadPlaylists() {
                const saved = localStorage.getItem('playlists');
                return saved ? JSON.parse(saved) : {
                    'All Songs': [],
                    'Favorites': []
                };
            }

            savePlaylists() {
                localStorage.setItem('playlists', JSON.stringify(this.playlists));
            }

            createPlaylist(name) {
                if (name && !this.playlists[name]) {
                    this.playlists[name] = [];
                    this.savePlaylists();
                    this.displayPlaylists();
                }
            }

            deletePlaylist(name) {
                if (name !== 'All Songs' && name !== 'Favorites') {
                    delete this.playlists[name];
                    this.savePlaylists();
                    this.displayPlaylists();
                }
            }

            displayPlaylists() {
                const playlistList = document.getElementById('playlistList');
                playlistList.innerHTML = '';

                Object.keys(this.playlists).forEach(name => {
                    const li = document.createElement('li');
                    li.className = 'playlist-item' + (this.currentPlaylist === name ? ' active' : '');
                    
                    const text = document.createElement('span');
                    text.textContent = `${name} (${this.playlists[name].length})`;
                    text.onclick = () => this.selectPlaylist(name);
                    
                    li.appendChild(text);

                    if (name !== 'All Songs' && name !== 'Favorites') {
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'delete-playlist';
                        deleteBtn.textContent = '✕';
                        deleteBtn.onclick = (e) => {
                            e.stopPropagation();
                            this.deletePlaylist(name);
                        };
                        li.appendChild(deleteBtn);
                    }

                    playlistList.appendChild(li);
                });
            }

            selectPlaylist(name) {
                this.currentPlaylist = name;
                this.currentSongIndex = 0;
                this.displayPlaylists();
                this.displaySongs();
            }

            getCurrentSongs() {
                if (this.currentPlaylist === 'All Songs') {
                    return this.allSongs.map(s => s.id);
                }
                return this.playlists[this.currentPlaylist] || [];
            }

            uploadMusic() {
                const fileInput = document.getElementById('musicUpload');
                const files = fileInput.files;

                if (files.length === 0) {
                    alert('Please select music files to upload');
                    return;
                }

                let uploadedCount = 0;

                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const song = {
                            id: Date.now() + Math.random(),
                            title: file.name.replace(/\.[^/.]+$/, ''),
                            artist: 'Unknown Artist',
                            genre: 'Other',
                            duration: '0:00',
                            url: e.target.result
                        };

                        this.allSongs.push(song);
                        if (!this.playlists['All Songs'].includes(song.id)) {
                            this.playlists['All Songs'].push(song.id);
                        }
                        uploadedCount++;
                    };
                    reader.readAsDataURL(file);
                });

                setTimeout(() => {
                    this.saveSongs();
                    this.savePlaylists();
                    this.displayPlaylists();
                    this.displaySongs();
                    fileInput.value = '';
                    if (uploadedCount > 0) {
                        alert(`✅ ${uploadedCount} song(s) uploaded successfully!`);
                    }
                }, 500);
            }

            displaySongs() {
                const songsList = document.getElementById('songsList');
                const currentSongs = this.getCurrentSongs();
                songsList.innerHTML = '';

                if (currentSongs.length === 0) {
                    songsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎵</div><p>No songs in this playlist. Upload music to get started!</p></div>';
                    return;
                }

                currentSongs.forEach((songId, index) => {
                    const song = this.allSongs.find(s => s.id === songId);
                    if (!song) return;

                    const li = document.createElement('li');
                    li.className = 'song-item' + (index === this.currentSongIndex && this.currentPlaylist === this.currentPlaylist ? ' playing' : '');

                    const info = document.createElement('div');
                    info.className = 'song-item-info';
                    info.onclick = () => this.playSong(index);

                    const title = document.createElement('div');
                    title.className = 'song-item-title';
                    title.textContent = song.title;

                    const details = document.createElement('div');
                    details.className = 'song-item-details';
                    details.textContent = `${song.artist} • ${song.genre}`;

                    info.appendChild(title);
                    info.appendChild(details);
                    li.appendChild(info);

                    const actions = document.createElement('div');
                    actions.className = 'song-item-actions';

                    const addBtn = document.createElement('button');
                    addBtn.className = 'add-to-playlist';
                    addBtn.textContent = '➕';
                    addBtn.onclick = (e) => {
                        e.stopPropagation();
                        this.showAddToPlaylistMenu(song.id);
                    };

                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-song';
                    removeBtn.textContent = '✕';
                    removeBtn.onclick = (e) => {
                        e.stopPropagation();
                        this.removeSongFromPlaylist(index);
                    };

                    actions.appendChild(addBtn);
                    actions.appendChild(removeBtn);
                    li.appendChild(actions);

                    songsList.appendChild(li);
                });
            }

            playSong(index) {
                const currentSongs = this.getCurrentSongs();
                if (index >= 0 && index < currentSongs.length) {
                    this.currentSongIndex = index;
                    const song = this.allSongs.find(s => s.id === currentSongs[index]);
                    
                    if (song && song.url) {
                        this.audio.src = song.url;
                        this.audio.play();
                        this.isPlaying = true;
                        this.updatePlayerUI();
                        this.displaySongs();
                        this.updateNowPlaying(song);
                    } else if (!song.url) {
                        alert('⚠️ This song has no file. Please upload an audio file.');
                    }
                }
            }

            togglePlay() {
                if (this.isPlaying) {
                    this.audio.pause();
                    this.isPlaying = false;
                } else {
                    if (!this.audio.src) this.playSong(0);
                    this.audio.play();
                    this.isPlaying = true;
                }
                this.updatePlayerUI();
            }

            nextSong() {
                const currentSongs = this.getCurrentSongs();
                if (currentSongs.length === 0) return;
                
                if (this.shuffle) {
                    this.currentSongIndex = Math.floor(Math.random() * currentSongs.length);
                } else {
                    this.currentSongIndex = (this.currentSongIndex + 1) % currentSongs.length;
                }
                this.playSong(this.currentSongIndex);
            }

            previousSong() {
                const currentSongs = this.getCurrentSongs();
                if (currentSongs.length === 0) return;
                
                this.currentSongIndex = (this.currentSongIndex - 1 + currentSongs.length) % currentSongs.length;
                this.playSong(this.currentSongIndex);
            }

            toggleShuffle() {
                this.shuffle = !this.shuffle;
                const btn = document.getElementById('shuffleBtn');
                btn.classList.toggle('active-control', this.shuffle);
            }

            toggleRepeat() {
                this.repeat = (this.repeat + 1) % 3;
                const btn = document.getElementById('repeatBtn');
                
                if (this.repeat === 0) {
                    btn.classList.remove('active-control');
                    btn.textContent = '🔁';
                } else if (this.repeat === 1) {
                    btn.classList.add('active-control');
                    btn.textContent = '🔁';
                } else {
                    btn.classList.add('active-control');
                    btn.textContent = '🔂';
                }
            }

            handleSongEnd() {
                if (this.repeat === 2) {
                    this.audio.currentTime = 0;
                    this.audio.play();
                } else {
                    this.nextSong();
                }
            }

            updateProgress() {
                const percent = (this.audio.currentTime / this.audio.duration) * 100 || 0;
                document.getElementById('progressBar').value = percent;
                document.getElementById('currentTime').textContent = this.formatTime(this.audio.currentTime);
            }

            updateDuration() {
                document.getElementById('duration').textContent = this.formatTime(this.audio.duration);
            }

            formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            updateNowPlaying(song) {
                document.getElementById('songTitle').textContent = song.title;
                document.getElementById('artistName').textContent = song.artist;
                document.getElementById('genreDisplay').textContent = `Genre: ${song.genre}`;
                
                const albumImg = document.getElementById('albumArt');
                if (this.isPlaying) {
                    albumImg.classList.remove('paused');
                } else {
                    albumImg.classList.add('paused');
                }
            }

            updatePlayerUI() {
                const playBtn = document.getElementById('playBtn');
                const albumImg = document.getElementById('albumArt');
                
                playBtn.textContent = this.isPlaying ? '⏸️' : '▶️';
                
                if (this.isPlaying) {
                    albumImg.classList.remove('paused');
                } else {
                    albumImg.classList.add('paused');
                }
            }

            searchSongs(query) {
                const searchInput = document.getElementById('searchInput');
                const search = query || searchInput.value.toLowerCase();

                if (search === '') {
                    this.displaySongs();
                    return;
                }

                const filtered = this.allSongs.filter(song =>
                    song.title.toLowerCase().includes(search) ||
                    song.artist.toLowerCase().includes(search)
                );

                const songsList = document.getElementById('songsList');
                songsList.innerHTML = '';

                if (filtered.length === 0) {
                    songsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No songs found</p></div>';
                    return;
                }

                filtered.forEach(song => {
                    const li = document.createElement('li');
                    li.className = 'song-item';

                    const info = document.createElement('div');
                    info.className = 'song-item-info';
                    info.onclick = () => {
                        const index = this.allSongs.indexOf(song);
                        this.currentPlaylist = 'All Songs';
                        this.playSong(index);
                    };

                    const title = document.createElement('div');
                    title.className = 'song-item-title';
                    title.textContent = song.title;

                    const details = document.createElement('div');
                    details.className = 'song-item-details';
                    details.textContent = `${song.artist} • ${song.genre}`;

                    info.appendChild(title);
                    info.appendChild(details);
                    li.appendChild(info);

                    songsList.appendChild(li);
                });
            }

            filterByGenre() {
                const genre = document.getElementById('genreFilter').value;
                const songsList = document.getElementById('songsList');
                songsList.innerHTML = '';

                if (genre === '') {
                    this.displaySongs();
                    return;
                }

                const currentSongs = this.getCurrentSongs();
                const filtered = currentSongs
                    .map(id => this.allSongs.find(s => s.id === id))
                    .filter(song => song && song.genre === genre);

                if (filtered.length === 0) {
                    songsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎵</div><p>No songs in this genre</p></div>';
                    return;
                }

                filtered.forEach(song => {
                    const li = document.createElement('li');
                    li.className = 'song-item';

                    const info = document.createElement('div');
                    info.className = 'song-item-info';
                    info.onclick = () => {
                        const index = currentSongs.indexOf(song.id);
                        this.playSong(index);
                    };

                    const title = document.createElement('div');
                    title.className = 'song-item-title';
                    title.textContent = song.title;

                    const details = document.createElement('div');
                    details.className = 'song-item-details';
                    details.textContent = `${song.artist} • ${song.genre}`;

                    info.appendChild(title);
                    info.appendChild(details);
                    li.appendChild(info);

                    songsList.appendChild(li);
                });
            }

            removeSongFromPlaylist(index) {
                const currentSongs = this.getCurrentSongs();
                const songId = currentSongs[index];
                
                const playlistIndex = this.playlists[this.currentPlaylist].indexOf(songId);
                if (playlistIndex > -1) {
                    this.playlists[this.currentPlaylist].splice(playlistIndex, 1);
                }

                this.savePlaylists();
                this.displaySongs();
            }

            showAddToPlaylistMenu(songId) {
                const playlistNames = Object.keys(this.playlists).filter(name => name !== this.currentPlaylist);
                
                if (playlistNames.length === 0) {
                    alert('Create a new playlist first!');
                    return;
                }

                const selected = prompt(`Add to playlist:\n\n${playlistNames.join('\n')}`);
                
                if (selected && this.playlists[selected]) {
                    if (!this.playlists[selected].includes(songId)) {
                        this.playlists[selected].push(songId);
                        this.savePlaylists();
                        this.displayPlaylists();
                        alert(`✅ Added to "${selected}"`);
                    } else {
                        alert(`Song already in "${selected}"`);
                    }
                }
            }
        }

        let player;

        window.addEventListener('DOMContentLoaded', () => {
            player = new MusicPlayer();
        });

        function createPlaylist() {
            const name = document.getElementById('playlistName').value;
            if (name) {
                player.createPlaylist(name);
                document.getElementById('playlistName').value = '';
            } else {
                alert('Please enter a playlist name');
            }
        }

        function uploadMusic() {
            player.uploadMusic();
        }

        function togglePlay() {
            player.togglePlay();
        }

        function nextSong() {
            player.nextSong();
        }

        function previousSong() {
            player.previousSong();
        }

        function toggleShuffle() {
            player.toggleShuffle();
        }

        function toggleRepeat() {
            player.toggleRepeat();
        }

        function searchSongs() {
            player.searchSongs();
        }

        function filterByGenre() {
            player.filterByGenre();
        }
    </script>
</body>
</html>
