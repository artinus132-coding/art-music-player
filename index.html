<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Artinus Music Pro | 2026 Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #8b5cf6;
            --glass: rgba(255, 255, 255, 0.03);
            --text-primary: #f8fafc;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-primary); height: 100vh; overflow: hidden; }

        /* --- LAYOUT --- */
        .app-container { display: flex; width: 100%; height: 100%; position: relative; }

        /* SIDEBAR (AUTO-HIDE LOGIC) */
        .sidebar {
            position: fixed; left: calc(-1 * var(--sidebar-width)); top: 0;
            width: var(--sidebar-width); height: 100%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            z-index: 1000; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.1); padding: 30px 20px;
        }
        .sidebar.open { transform: translateX(var(--sidebar-width)); }
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 999;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        /* MAIN CONTENT */
        .main-view {
            flex: 1; height: 100%; overflow-y: auto; padding: 20px;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        /* --- VISUALIZER --- */
        #visualizer {
            width: 100%; height: 120px; margin-bottom: 20px;
            border-radius: 12px; background: rgba(0,0,0,0.2);
        }

        /* --- PLAYER HERO --- */
        .player-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 30px; text-align: center;
            margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .art-container { position: relative; width: 200px; height: 200px; margin: 0 auto 20px; }
        .main-art { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--accent); animation: rotate 10s linear infinite;
            animation-play-state: paused;
        }
        body.playing .main-art { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- CONTROLS --- */
        .progress-area { margin: 20px 0; cursor: pointer; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; position: relative; }
        .bar-fill::after {
            content: ''; position: absolute; right: -5px; top: -4px;
            width: 14px; height: 14px; background: #fff; border-radius: 50%;
        }

        .control-grid { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn { 
            background: none; border: none; color: white; cursor: pointer; 
            font-size: 1.2rem; transition: 0.2s; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .btn:active { transform: scale(0.9); }
        .btn-play { background: var(--accent); width: 60px; height: 60px; font-size: 1.5rem; }
        .speed-badge { font-size: 10px; font-weight: 800; border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; }

        /* --- LIST --- */
        .song-item {
            display: flex; align-items: center; padding: 15px;
            border-radius: 12px; margin-bottom: 8px; cursor: pointer;
            transition: 0.3s; background: rgba(255,255,255,0.02);
        }
        .song-item:hover { background: rgba(255,255,255,0.05); }
        .song-item.active { background: var(--accent); color: white; }

        .menu-btn { font-size: 24px; cursor: pointer; margin-bottom: 20px; display: inline-block; }

        @media (min-width: 1024px) {
            .sidebar { position: relative; left: 0; transform: none !important; }
            .sidebar-overlay, .menu-btn { display: none !important; }
        }
    </style>
</head>
<body id="app">

    <div class="sidebar-overlay" id="overlay" onclick="ui.toggleMenu()"></div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <h2 style="margin-bottom: 30px; font-weight: 800; color: var(--accent);">ARTINUS VOL. 2</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div class="song-item" onclick="engine.filter('all')">🎵 All Songs</div>
                <div class="song-item" onclick="engine.filter('vocal')">🎙️ Vocal Hits</div>
                <div class="song-item" onclick="engine.filter('mood')">✨ Chill Mood</div>
                <hr style="opacity: 0.1;">
                <input type="file" id="up" hidden multiple onchange="engine.handleUpload(event)">
                <button onclick="document.getElementById('up').click()" style="padding: 12px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 600;">Upload Local MP3</button>
            </div>
        </aside>

        <main class="main-view">
            <div class="menu-btn" onclick="ui.toggleMenu()">☰</div>
            
            <canvas id="visualizer"></canvas>

            <section class="player-card">
                <div class="art-container">
                    <img id="trackArt" src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=400" class="main-art">
                </div>
                <h1 id="trackTitle" style="font-size: 1.5rem;">Select Vocal Track</h1>
                <p id="trackArtist" style="opacity: 0.6; margin-bottom: 10px;">Artinus AI Player</p>

                <div class="progress-area" id="seekTrack">
                    <div class="bar-bg">
                        <div class="bar-fill" id="progressFill"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; opacity: 0.5;">
                        <span id="timeCur">0:00</span>
                        <span id="timeDur">0:00</span>
                    </div>
                </div>

                <div class="control-grid">
                    <button class="btn speed-badge" id="speedBtn" onclick="engine.cycleSpeed()">1.0x</button>
                    <button class="btn" onclick="engine.prev()">⏮</button>
                    <button class="btn btn-play" id="playBtn" onclick="engine.toggle()">▶</button>
                    <button class="btn" onclick="engine.next()">⏭</button>
                    <button class="btn" onclick="engine.toggleRepeat()" id="repeatBtn">🔁</button>
                </div>
            </section>

            <div id="playlist"></div>
        </main>
    </div>

    <audio id="audio"></audio>

    <script>
        // COMPLICATED STATE ENGINE
        const engine = {
            audio: document.getElementById('audio'),
            ctx: null,
            analyser: null,
            songs: [
                { title: "Dreaming with You", artist: "Vocalist CC", genre: "vocal", url: "https://cdn.pixabay.com/audio/2022/10/14/audio_9939f992f7.mp3", art: "https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=400" },
                { title: "Lost in Tokyo", artist: "Synth Pop Vocal", genre: "vocal", url: "https://cdn.pixabay.com/audio/2023/10/24/audio_1456a2c79a.mp3", art: "https://images.unsplash.com/photo-1514525253344-99a4299966c2?w=400" },
                { title: "The Midnight Sun", artist: "Melodic Voice", genre: "mood", url: "https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3", art: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400" }
            ],
            index: -1,
            speeds: [0.5, 1.0, 1.5, 2.0],
            sIdx: 1,
            repeat: false,

            init() {
                this.setupVisualizer();
                this.audio.ontimeupdate = () => ui.updateProgress();
                this.audio.onended = () => this.repeat ? this.play(this.index) : this.next();
                
                document.getElementById('seekTrack').onclick = (e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    this.audio.currentTime = ((e.clientX - rect.left) / rect.width) * this.audio.duration;
                    if(this.audio.paused) this.toggle();
                };
                this.render();
            },

            setupVisualizer() {
                this.audio.onplay = () => {
                    if (!this.ctx) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        this.ctx = new AudioContext();
                        const source = this.ctx.createMediaElementSource(this.audio);
                        this.analyser = this.ctx.createAnalyser();
                        source.connect(this.analyser);
                        this.analyser.connect(this.ctx.destination);
                        this.draw();
                    }
                };
            },

            draw() {
                const canvas = document.getElementById('visualizer');
                const c = canvas.getContext('2d');
                const data = new Uint8Array(this.analyser.frequencyBinCount);
                
                const renderFrame = () => {
                    requestAnimationFrame(renderFrame);
                    this.analyser.getByteFrequencyData(data);
                    c.clearRect(0, 0, canvas.width, canvas.height);
                    c.fillStyle = '#8b5cf6';
                    data.forEach((v, i) => {
                        if (i % 4 === 0) {
                            const h = (v / 255) * canvas.height;
                            c.fillRect(i * 1.5, canvas.height - h, 2, h);
                        }
                    });
                };
                renderFrame();
            },

            play(i) {
                this.index = i;
                const s = this.songs[i];
                this.audio.src = s.url;
                this.audio.playbackRate = this.speeds[this.sIdx];
                this.audio.play();
                ui.updateMeta(s);
                this.render();
                document.body.classList.add('playing');
                ui.closeMenu(); 
            },

            toggle() {
                if(this.index === -1) return this.play(0);
                this.audio.paused ? this.audio.play() : this.audio.pause();
                document.getElementById('playBtn').textContent = this.audio.paused ? "▶" : "⏸";
                document.body.classList.toggle('playing', !this.audio.paused);
            },

            next() { this.play((this.index + 1) % this.songs.length); },
            prev() { this.play((this.index - 1 + this.songs.length) % this.songs.length); },

            cycleSpeed() {
                this.sIdx = (this.sIdx + 1) % this.speeds.length;
                this.audio.playbackRate = this.speeds[this.sIdx];
                document.getElementById('speedBtn').textContent = this.speeds[this.sIdx] + 'x';
            },

            toggleRepeat() {
                this.repeat = !this.repeat;
                document.getElementById('repeatBtn').style.color = this.repeat ? '#8b5cf6' : '#fff';
            },

            filter(type) {
                this.render(type === 'all' ? null : type);
                ui.closeMenu();
            },

            render(f = null) {
                const container = document.getElementById('playlist');
                container.innerHTML = "";
                this.songs.forEach((s, i) => {
                    if(f && s.genre !== f) return;
                    const el = document.createElement('div');
                    el.className = `song-item ${this.index === i ? 'active' : ''}`;
                    el.innerHTML = `<div><b>${s.title}</b><br><small>${s.artist}</small></div>`;
                    el.onclick = () => this.play(i);
                    container.appendChild(el);
                });
            },

            handleUpload(e) {
                Array.from(e.target.files).forEach(file => {
                    this.songs.push({
                        title: file.name.split('.')[0],
                        artist: "Local Upload",
                        url: URL.createObjectURL(file),
                        genre: "vocal",
                        art: "https://images.unsplash.com/photo-1459749411177-042180ce673c?w=400"
                    });
                });
                this.render();
                alert("New tracks added to Vocal Hits!");
            }
        };

        const ui = {
            toggleMenu() {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('overlay').classList.toggle('active');
            },
            closeMenu() {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').classList.remove('active');
            },
            updateProgress() {
                const p = (engine.audio.currentTime / engine.audio.duration) * 100;
                document.getElementById('progressFill').style.width = (p || 0) + '%';
                document.getElementById('timeCur').textContent = this.fmt(engine.audio.currentTime);
                document.getElementById('timeDur').textContent = this.fmt(engine.audio.duration);
            },
            updateMeta(s) {
                document.getElementById('trackTitle').textContent = s.title;
                document.getElementById('trackArtist').textContent = s.artist;
                document.getElementById('trackArt').src = s.art;
                document.getElementById('playBtn').textContent = "⏸";
            },
            fmt(s) {
                if(isNaN(s)) return "0:00";
                const m = Math.floor(s/60), sec = Math.floor(s%60);
                return `${m}:${sec < 10 ? '0' : ''}${sec}`;
            }
        };

        engine.init();
    </script>
</body>
</html>
